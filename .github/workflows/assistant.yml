name: AI Work Assistant v3

on:
  schedule:
    - cron: '30 0 * * *'
  repository_dispatch:
    types: [telegram_message]
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily

permissions:
  models: read

jobs:
  daily-policy-push:
    if: github.event.schedule == '30 0 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Run daily policy push
        run: node index.js --daily
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  handle-telegram-message:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Process message
        run: |
          node -e "
            const { processMessage } = require('./src/main');
            const chatId = '${{ github.event.client_payload.chatId }}';
            const text = '${{ github.event.client_payload.text }}';
            console.log('收到消息: chatId=' + chatId + ' text=' + text);
            processMessage(chatId, text).then(r => {
              console.log('处理完成:', JSON.stringify(r));
              process.exit(r.success ? 0 : 1);
            }).catch(e => {
              console.error('处理失败:', e);
              process.exit(1);
            });
          "
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
