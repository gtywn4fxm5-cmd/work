name: AI Work Assistant v3

on:
  # 临时禁用所有触发器，停止无限触发
  # schedule:
  #   - cron: '30 0 * * *'
  #   - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'poll'
        type: choice
        options:
          - poll
          - daily
  # repository_dispatch:
  #   types:
  #     - telegram_message
  #     - daily_push

jobs:
  daily-policy-push:
    if: github.event.schedule == '30 0 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily') || (github.event_name == 'repository_dispatch' && github.event.action == 'daily_push')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Run daily policy push
        run: node index.js --daily
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Trigger next poll
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/assistant.yml/dispatches" \
            -d '{"ref":"main","inputs":{"mode":"poll"}}'
        continue-on-error: true

  poll-messages:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Restore offset cache
        uses: actions/cache@v5
        with:
          path: .offset
          key: telegram-offset-v1
          restore-keys: |
            telegram-offset-

      - name: Process messages (scheduled)
        id: process_messages
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'poll') || github.event_name == 'schedule'
        run: |
          OUTPUT=$(node index.js)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "获取到 0 条消息"; then
            echo "has_messages=false" >> $GITHUB_OUTPUT
          else
            echo "has_messages=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Trigger next poll (fallback)
        if: always() && steps.process_messages.outputs.has_messages == 'true'
        run: |
          echo "=== Workflow层自触发 ==="
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/assistant.yml/dispatches" \
            -d '{"ref":"main","inputs":{"mode":"poll"}}')
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ 自触发成功 (204 No Content)"
          else
            echo "❌ 自触发失败 HTTP $HTTP_CODE"
          fi
        continue-on-error: true

      - name: Process message (webhook triggered)
        if: github.event_name == 'repository_dispatch'
        run: |
          node -e "
            const { processMessage } = require('./src/main');
            const chatId = '${{ github.event.client_payload.chatId }}';
            const text = '${{ github.event.client_payload.text }}';
            processMessage(chatId, text).then(r => console.log('Done:', r));
          "
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
