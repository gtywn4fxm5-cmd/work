name: AI Work Assistant v4

on:
  schedule:
    - cron: '30 0 * * *'
  repository_dispatch:
    types: [telegram_message]
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily

permissions:
  models: read

jobs:
  daily-policy-push:
    if: github.event.schedule == '30 0 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Run daily policy push
        run: node index.js --daily
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  handle-telegram-message:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Process message
        run: |
          node -e "
            const { sendMessage } = require('./src/telegram');
            const { processMessage } = require('./src/main');
            const { triage, formatTriageCard, generateDraft, logProject, formatProjectLog } = require('./src/triage');
            const { fetchFromGoogleAlerts } = require('./src/policy-scraper');
            const { summarizePolicy, generateChecklist, generateMeetingPrep } = require('./src/policy-analyzer');
            const { createProfile, formatProfileCard, saveProfileToNotion, queryProfile, formatProfileList } = require('./src/profile');
            const { createPipeline, formatPipelineCard, savePipelineToNotion, queryPipeline, formatPipelineList } = require('./src/pipeline');
            const { generateMaterialList, formatBasicMaterialList, MATERIAL_TEMPLATES } = require('./src/material');
            const { generateScript, listScenarios } = require('./src/script');
            const { searchCase, formatCaseResult } = require('./src/casebase');

            const chatId = '${{ github.event.client_payload.chatId }}';
            const text = '${{ github.event.client_payload.text }}';

            console.log('收到消息: chatId=' + chatId + ' text=' + text);

            async function handle() {
              if (text === '/start') {
                await sendMessage(chatId, '🤖 跨境业务助手 v4.0\n\n👤 /profile  - 客户画像（录入/查询）\n🔗 /pipeline - 业务链跟踪\n📋 /material - 材料清单（按业务细分）\n🎭 /script   - 场景话术生成\n📌 /case     - 案例/FAQ/解决方案\n🏷️ /triage   - 业务分诊卡\n📰 /policy   - 今日政策简报\n🤝 /meeting  - 会议速读卡\n📝 /draft    - 商务文档生成\n📌 /log      - 项目进度记录\n❓ /ask      - 业务问答\n📊 /status   - 系统状态');
                return;
              }

              if (text === '/help') {
                await sendMessage(chatId, '📖 使用指南\n\n👤 /profile [客户描述] 或 /profile search [关键词]\n🔗 /pipeline [业务描述] 或 /pipeline search [关键词]\n📋 /material [业务类型] 如: /material 开户\n🎭 /script [场景] [背景] 如: /script 方案推荐 香港开户\n📌 /case [关键词] 或 /case [业务类型]\n🏷️ /triage [业务描述]\n📰 /policy\n🤝 /meeting [主题]\n📝 /draft [要求]\n📌 /log [进度更新]\n❓ /ask [问题]');
                return;
              }

              if (text === '/status') {
                await sendMessage(chatId, '📊 系统状态 v4.0\n\n✅ Telegram Bot: 运行中\n✅ GitHub Actions: 运行中\n⏰ 每日政策推送: 8:30 (UTC+8)\n\n📦 模块状态:\n👤 客户画像: ✅\n🔗 业务链: ✅\n📋 材料清单: ✅\n🎭 话术库: ✅\n📌 案例库: ✅');
                return;
              }

              if (text === '/policy') {
                await sendMessage(chatId, '🔍 正在扫描政策更新...');
                const items = await fetchFromGoogleAlerts();
                if (items.length === 0) { await sendMessage(chatId, '📰 今日暂无新政策'); return; }
                const summary = await summarizePolicy(items);
                await sendMessage(chatId, summary);
                return;
              }

              if (text.startsWith('/profile')) {
                const input = text.replace('/profile', '').trim();
                if (!input) { await sendMessage(chatId, '👤 客户画像\n\n录入: /profile 制造业中型企业想在新加坡开户\n查询: /profile search 制造业'); return; }
                if (input.startsWith('search ')) {
                  const keyword = input.replace('search', '').trim();
                  await sendMessage(chatId, '🔍 正在查询客户画像...');
                  const profiles = await queryProfile(keyword);
                  await sendMessage(chatId, formatProfileList(profiles));
                  return;
                }
                await sendMessage(chatId, '👤 正在生成客户画像...');
                const profile = await createProfile(input);
                await sendMessage(chatId, formatProfileCard(profile));
                const url = await saveProfileToNotion(profile);
                if (url) await sendMessage(chatId, '📝 已归档到Notion: ' + url);
                return;
              }

              if (text.startsWith('/pipeline')) {
                const input = text.replace('/pipeline', '').trim();
                if (!input) { await sendMessage(chatId, '🔗 业务链跟踪\n\n新建: /pipeline 张总要在香港设公司做ODI\n查询: /pipeline search 张总'); return; }
                if (input.startsWith('search ')) {
                  const keyword = input.replace('search', '').trim();
                  await sendMessage(chatId, '🔍 正在查询业务链...');
                  const pipelines = await queryPipeline(keyword);
                  await sendMessage(chatId, formatPipelineList(pipelines));
                  return;
                }
                await sendMessage(chatId, '🔗 正在创建业务链...');
                const pipeline = await createPipeline(input);
                await sendMessage(chatId, formatPipelineCard(pipeline));
                const url = await savePipelineToNotion(pipeline);
                if (url) await sendMessage(chatId, '📝 已归档到Notion: ' + url);
                return;
              }

              if (text.startsWith('/material')) {
                const input = text.replace('/material', '').trim();
                if (!input) {
                  const types = Object.keys(MATERIAL_TEMPLATES).join(' / ');
                  await sendMessage(chatId, '📋 材料清单\n\n用法: /material [业务类型]\n\n支持: ' + types);
                  return;
                }
                await sendMessage(chatId, '📋 正在生成材料清单...');
                const result = await generateMaterialList(input, '通用');
                await sendMessage(chatId, result);
                return;
              }

              if (text.startsWith('/script')) {
                const input = text.replace('/script', '').trim();
                if (!input) { await sendMessage(chatId, listScenarios()); return; }
                const parts = input.split(/\s+/);
                const scenario = parts[0];
                const context = parts.slice(1).join(' ') || '';
                await sendMessage(chatId, '🎭 正在生成话术...');
                const result = await generateScript(scenario, context);
                await sendMessage(chatId, result);
                return;
              }

              if (text.startsWith('/case')) {
                const input = text.replace('/case', '').trim();
                if (!input) { await sendMessage(chatId, '📌 案例库\n\n用法: /case [关键词或业务类型]\n例: /case ODI\n例: /case 香港开户'); return; }
                await sendMessage(chatId, '📌 正在检索案例库...');
                const result = await searchCase(input, null);
                await sendMessage(chatId, formatCaseResult(result));
                return;
              }

              if (text.startsWith('/triage')) {
                const input = text.replace('/triage', '').trim();
                if (!input) { await sendMessage(chatId, '请输入业务描述，例：/triage 制造业客户要在迪拜设公司'); return; }
                await sendMessage(chatId, '🏷️ 正在生成分诊卡...');
                const card = await triage(input);
                await sendMessage(chatId, formatTriageCard(card));
                return;
              }

              if (text.startsWith('/checklist')) {
                const args = text.replace('/checklist', '').trim();
                await sendMessage(chatId, '📋 正在生成材料清单...');
                const checklist = await generateChecklist(args || '通用', '通用');
                await sendMessage(chatId, checklist);
                return;
              }

              if (text.startsWith('/meeting')) {
                const args = text.replace('/meeting', '').trim();
                if (!args) { await sendMessage(chatId, '请输入会议主题，例：/meeting 香港公司注册咨询'); return; }
                await sendMessage(chatId, '🤝 正在准备会议速读卡...');
                const prep = await generateMeetingPrep(args);
                await sendMessage(chatId, prep);
                return;
              }

              if (text.startsWith('/draft')) {
                const args = text.replace('/draft', '').trim();
                if (!args) { await sendMessage(chatId, '请输入要求，例：/draft 将ODI备案清单转成发给客户的邮件'); return; }
                await sendMessage(chatId, '📝 正在生成商务文档...');
                const draft = await generateDraft(args, '正式邮件', '专业、简洁');
                await sendMessage(chatId, draft);
                return;
              }

              if (text.startsWith('/log')) {
                const args = text.replace('/log', '').trim();
                if (!args) { await sendMessage(chatId, '请输入进度更新'); return; }
                await sendMessage(chatId, '📌 正在记录项目进度...');
                const log = await logProject(args);
                await sendMessage(chatId, formatProjectLog(log));
                return;
              }

              if (text.startsWith('/ask')) {
                const q = text.replace('/ask', '').trim();
                await processMessage(chatId, q || text);
                return;
              }

              await processMessage(chatId, text);
            }

            handle().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROFILE_DB_ID: ${{ secrets.NOTION_PROFILE_DB_ID }}
          NOTION_PIPELINE_DB_ID: ${{ secrets.NOTION_PIPELINE_DB_ID }}
          NOTION_CASE_DB_ID: ${{ secrets.NOTION_CASE_DB_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
